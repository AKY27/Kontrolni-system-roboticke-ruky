<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control</title>
    <link rel="stylesheet" href="public/output.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800">
    <div class="flex flex-col lg:flex-row h-full gap-6 p-4 md:p-6 overflow-hidden">
        <!-- Control Panel -->
        <div class="flex flex-col lg:w-96 bg-gradient-to-b from-gray-800 to-gray-900 rounded-xl shadow-2xl p-6 md:p-8 overflow-y-auto border border-gray-700">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Robot Control</h2>
                <p class="text-gray-400 text-sm">6-DOF Robotic Arm Controller</p>
            </div>
            
            <!-- Controls grid -->
            <div class="space-y-8">
                <!-- Yaw -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-white font-semibold text-sm uppercase tracking-wide">Yaw</label>
                        <span id="yawValue" class="text-blue-400 font-mono text-lg">0°</span>
                    </div>
                    <input id="yaw" type="range" min="-90" max="90" value="0" step="5" class="slider w-full h-2 bg-gray-700 rounded-full appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-colors">
                </div>
                
                <!-- Pitch 1 -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-white font-semibold text-sm uppercase tracking-wide">Pitch 1</label>
                        <span id="pitch1Value" class="text-blue-400 font-mono text-lg">0°</span>
                    </div>
                    <input id="pitch1" type="range" min="-90" max="90" value="90" step="5" class="slider w-full h-2 bg-gray-700 rounded-full appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-colors">
                </div>
                
                <!-- Pitch 2 -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-white font-semibold text-sm uppercase tracking-wide">Pitch 2</label>
                        <span id="pitch2Value" class="text-blue-400 font-mono text-lg">0°</span>
                    </div>
                    <input id="pitch2" type="range" min="-90" max="90" value="0" step="5" class="slider w-full h-2 bg-gray-700 rounded-full appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-colors">
                </div>
                
                <!-- Pitch 3 -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-white font-semibold text-sm uppercase tracking-wide">Pitch 3</label>
                        <span id="pitch3Value" class="text-blue-400 font-mono text-lg">0°</span>
                    </div>
                    <input id="pitch3" type="range" min="-90" max="90" value="0" step="5" class="slider w-full h-2 bg-gray-700 rounded-full appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-colors">
                </div>
                
                <!-- Roll -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-white font-semibold text-sm uppercase tracking-wide">Roll</label>
                        <span id="rollValue" class="text-blue-400 font-mono text-lg">0°</span>
                    </div>
                    <input id="roll" type="range" min="-90" max="90" value="0" step="5" class="slider w-full h-2 bg-gray-700 rounded-full appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-colors">
                </div>
                
                <!-- Gripper -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="text-white font-semibold text-sm uppercase tracking-wide">Gripper</label>
                        <span id="gripperValue" class="text-green-400 font-mono text-lg">0%</span>
                    </div>
                    <input id="gripper" type="range" min="0" max="100" value="0" step="5" class="slider w-full h-2 bg-gray-700 rounded-full appearance-none cursor-pointer accent-green-500 hover:accent-green-400 transition-colors">
                </div>
            </div>

            <!-- Gripper Position Readout -->
            <div class="bg-gray-950 rounded-lg p-4 border border-gray-600 mt-8">
                <h3 class="text-white font-semibold mb-4 text-sm uppercase tracking-wide">Gripper Base Position (World Coordinates)</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-gray-400 text-xs uppercase tracking-wide mb-1">X</p>
                        <p id="gripperX" class="text-cyan-400 font-mono text-lg">0.00</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs uppercase tracking-wide mb-1">Y</p>
                        <p id="gripperY" class="text-cyan-400 font-mono text-lg">0.00</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs uppercase tracking-wide mb-1">Z</p>
                        <p id="gripperZ" class="text-cyan-400 font-mono text-lg">0.00</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-xs uppercase tracking-wide mb-1">Pitch</p>
                        <p id="gripperPitch" class="text-purple-400 font-mono text-lg">0.00°</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Visualizer -->
        <div class="flex-1 bg-gradient-to-b from-gray-800 to-gray-900 rounded-xl shadow-2xl p-6 md:p-8 overflow-hidden border border-gray-700 flex flex-col min-h-80 lg:min-h-0">
            <div class="mb-6">
                <h2 class="text-3xl font-bold text-white">Visualization</h2>
                <p class="text-gray-400 text-sm mt-1">Real-time 3D arm rendering</p>
            </div>
            <div id="visualizer" class="flex-1 w-full rounded-lg bg-gray-950 border border-gray-600"></div>
        </div>
    </div>

    <script src="src/script.js"></script>
</body>
</html>
