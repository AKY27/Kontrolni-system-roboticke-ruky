<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot FK Control</title>
    <link rel="stylesheet" href="robot.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div class="page">

    <!-- ===== Panel ===== -->
    <div class="panel">
        <div>
            <h1 class="panel-title">Robot <span>FK</span></h1>
            <p class="panel-subtitle">Forward Kinematics</p>
        </div>

        <a class="nav-link" href="/ik">IK mode →</a>

        <!-- Sliders -->
        <div style="display:flex;flex-direction:column;gap:1.1rem;">

            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label lbl-blue">Yaw</span>
                    <span class="slider-value val-blue" id="yawValue">0°</span>
                </div>
                <input id="yaw" type="range" min="-90" max="90" value="0" step="5" class="accent-blue">
            </div>

            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label lbl-blue">Pitch 1</span>
                    <span class="slider-value val-blue" id="pitch1Value">0°</span>
                </div>
                <input id="pitch1" type="range" min="-90" max="90" value="90" step="5" class="accent-blue">
            </div>

            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label lbl-blue">Pitch 2</span>
                    <span class="slider-value val-blue" id="pitch2Value">0°</span>
                </div>
                <input id="pitch2" type="range" min="-90" max="90" value="0" step="5" class="accent-blue">
            </div>

            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label lbl-blue">Pitch 3</span>
                    <span class="slider-value val-blue" id="pitch3Value">0°</span>
                </div>
                <input id="pitch3" type="range" min="-90" max="90" value="0" step="5" class="accent-blue">
            </div>

            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label lbl-sky">Roll</span>
                    <span class="slider-value val-sky" id="rollValue">0°</span>
                </div>
                <input id="roll" type="range" min="-90" max="90" value="0" step="5" class="accent-sky">
            </div>

            <div class="slider-row">
                <div class="slider-header">
                    <span class="slider-label lbl-teal">Gripper</span>
                    <span class="slider-value val-teal" id="gripperValue">0%</span>
                </div>
                <input id="gripper" type="range" min="0" max="100" value="0" step="5" class="accent-teal">
            </div>
        </div>

        <!-- Gripper position readout -->
        <div class="readout-card">
            <p class="card-title">Gripper Position (World)</p>
            <div class="readout-grid">
                <div class="readout-cell">
                    <p class="cell-label">X</p>
                    <p class="cell-value val-cyan" id="gripperX">0.00</p>
                </div>
                <div class="readout-cell">
                    <p class="cell-label">Y</p>
                    <p class="cell-value val-cyan" id="gripperY">0.00</p>
                </div>
                <div class="readout-cell">
                    <p class="cell-label">Z</p>
                    <p class="cell-value val-cyan" id="gripperZ">0.00</p>
                </div>
                <div class="readout-cell">
                    <p class="cell-label">Pitch</p>
                    <p class="cell-value val-purple" id="gripperPitch">0.00°</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Viewport ===== -->
    <div class="viewport" id="visualizer">
        <div class="cam-hint">Left drag: orbit · Right drag: pan · Scroll: zoom</div>
    </div>

</div>
<script src="public/script.js"></script>
</body>
</html>
